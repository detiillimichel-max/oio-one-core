  <style>
    /* ========== SEU CSS ORIGINAL (MANTIDO INTACTO) ========== */
    *{margin:0;padding:0;box-sizing:border-box} html,body{height:100%;width:100%;overflow:hidden;font-family:'Inter',system-ui,-apple-system,sans-serif;background:#111b21;color:#e9edef} input,textarea,button{font-family:inherit;border:none;outline:none} button{cursor:pointer;background:none} ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#374045;border-radius:3px} #splash{position:fixed;inset:0;background:linear-gradient(135deg,#075E54 0%,#128C7E 50%,#25D366 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s} #splash.hide{opacity:0;pointer-events:none} #splash .logo{width:120px;height:120px;background:rgba(255,255,255,.15);border-radius:30px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:pulse 2s infinite} #splash .logo svg{width:64px;height:64px;fill:#fff} #splash h1{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px} #splash p{color:rgba(255,255,255,.7);margin-top:8px;font-size:14px} @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}} #loginScreen{position:fixed;inset:0;background:#111b21;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px} #loginScreen.hide{display:none} .login-card{background:#1f2c33;border-radius:24px;padding:48px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)} .login-card .icon-wrap{width:100px;height:100px;background:linear-gradient(135deg,#075E54,#25D366);border-radius:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px} .login-card .icon-wrap svg{width:52px;height:52px;fill:#fff} .login-card h2{font-size:28px;font-weight:700;margin-bottom:8px;color:#e9edef} .login-card p{color:#8696a0;font-size:14px;line-height:1.5;margin-bottom:24px} 
    /* CSS NOVO PARA O LOGIN DE EMAIL/SENHA */
    .auth-input{width:100%;padding:14px 16px;background:#2a3942;border-radius:10px;color:#e9edef;font-size:15px;margin-bottom:12px;} .auth-input::placeholder{color:#8696a0;}
    .primary-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px 24px;background:#25D366;color:#111b21;border-radius:10px;font-size:16px;font-weight:600;margin-bottom:12px;transition:all .2s;} .primary-btn:active{transform:scale(.98)}
    .secondary-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px 24px;background:transparent;color:#25D366;border:1px solid #25D366;border-radius:10px;font-size:16px;font-weight:600;transition:all .2s;} .secondary-btn:active{transform:scale(.98)}
    /* FIM DO CSS NOVO */
    .login-footer{margin-top:24px;font-size:12px;color:#8696a0} #app{display:none;height:100%;width:100%;flex-direction:column} #app.show{display:flex} .top-bar{background:#1f2c33;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;min-height:56px;border-bottom:1px solid #2a3942} .top-bar .left{display:flex;align-items:center;gap:12px} .top-bar .user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #25D366;cursor:pointer} .top-bar .app-title{font-size:20px;font-weight:700;color:#e9edef;letter-spacing:-.5px} .top-bar .actions{display:flex;gap:8px} .top-bar .actions button{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#aebac1;transition:background .2s} .top-bar .actions button:hover{background:#2a3942} .top-bar .actions button svg{width:20px;height:20px} .tabs{display:flex;background:#1f2c33;border-bottom:1px solid #2a3942} .tabs button{flex:1;padding:12px;font-size:14px;font-weight:600;color:#8696a0;position:relative;transition:color .2s} .tabs button.active{color:#25D366} .tabs button.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#25D366;border-radius:3px 3px 0 0} .search-bar{padding:8px 16px;background:#111b21} .search-bar .search-wrap{display:flex;align-items:center;background:#1f2c33;border-radius:10px;padding:0 12px;gap:8px} .search-bar .search-wrap svg{width:18px;height:18px;color:#8696a0;flex-shrink:0} .search-bar input{flex:1;padding:10px 0;background:transparent;color:#e9edef;font-size:14px} .search-bar input::placeholder{color:#8696a0} .chat-list{flex:1;overflow-y:auto;background:#111b21} .chat-item{display:flex;align-items:center;padding:12px 16px;gap:12px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(134,150,160,.08)} .chat-item:hover{background:#1f2c33} .chat-item:active{background:#2a3942} .chat-item .avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#2a3942} .chat-item .info{flex:1;min-width:0} .chat-item .info .name{font-size:16px;font-weight:500;color:#e9edef;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .chat-item .info .last-msg{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px} .chat-item .meta{text-align:right;flex-shrink:0} .chat-item .meta .time{font-size:12px;color:#8696a0} .chat-item .meta .badge{background:#25D366;color:#111b21;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-top:4px;margin-left:auto;padding:0 6px} .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8696a0;padding:48px;text-align:center} .empty-state svg{width:80px;height:80px;margin-bottom:16px;opacity:.3} .empty-state h3{font-size:18px;margin-bottom:8px;color:#e9edef} .empty-state p{font-size:14px;line-height:1.5} #chatView{position:fixed;inset:0;background:#111b21;display:none;flex-direction:column;z-index:50} #chatView.show{display:flex} .chat-header{background:#1f2c33;padding:10px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a3942} .chat-header .back-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#aebac1} .chat-header .back-btn:hover{background:#2a3942} .chat-header .peer-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#2a3942} .chat-header .peer-info{flex:1;min-width:0} .chat-header .peer-info .peer-name{font-size:16px;font-weight:600;color:#e9edef} .chat-header .peer-info .peer-status{font-size:12px;color:#8696a0} .chat-header .header-actions{display:flex;gap:4px} .chat-header .header-actions button{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#aebac1} .messages-area{flex:1;overflow-y:auto;padding:8px 12px;background:#0b141a;backg .msg-input::placeholder{color:#8696a0} .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;opacity:0;transition:opacity .3s} .drawer-overlay.show{display:block;opacity:1} .drawer{position:fixed;top:0;left:-100%;width:85%;max-width:360px;height:100%;background:#111b21;z-index:201;transition:left .3s ease;overflow-y:auto} .drawer.show{left:0} .drawer-header{background:linear-gradient(135deg,#075E54,#128C7E);padding:60px 20px 20px;position:relative} .drawer-header .close-drawer{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff} .drawer-header .profile-img{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.3);object-fit:cover;margin-bottom:12px;background:#2a3942} .drawer-header h3{color:#fff;font-size:18px;font-weight:600} .drawer-header p{color:rgba(255,255,255,.7);font-size:13px} .drawer-menu{padding:8px 0} .drawer-menu-item{display:flex;align-items:center;gap:16px;padding:16px 20px;color:#e9edef;font-size:15px;transition:background .15s;cursor:pointer} .drawer-menu-item:hover{background:#1f2c33} .drawer-menu-item svg{width:22px;height:22px;color:#8696a0} .drawer-divider{height:1px;background:#2a3942;margin:4px 0} .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;background:#25D366;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#111b21;box-shadow:0 4px 16px rgba(37,211,102,.3);transition:all .2s;z-index:10} .fab:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(37,211,102,.4)} .fab svg{width:26px;height:26px} .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:flex-end;justify-content:center} .modal-overlay.show{display:flex} .modal{background:#1f2c33;width:100%;max-width:480px;max-height:70vh;border-radius:20px 20px 0 0;padding:20px;animation:slideUp .3s ease} @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}} .modal h3{font-size:18px;font-weight:600;color:#e9edef;margin-bottom:16px} .modal input{width:100%;padding:12px 16px;background:#2a3942;border-radius:10px;color:#e9edef;font-size:15px;margin-bottom:16px} .modal input::placeholder{color:#8696a0} .modal .start-chat-btn{width:100%;padding:14px;background:#25D366;color:#111b21;border-radius:12px;font-size:16px;font-weight:600;transition:background .2s} .modal .start-chat-btn:hover{background:#1eba59} .typing-indicator{padding:4px 12px;font-size:12px;color:#25D366;font-style:italic;min-height:20px} @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}} .msg{animation:fadeIn .2s ease}
  </style>

<body>

  <div id="splash">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <h1>VibeChat</h1>
    <p>Conectando pessoas</p>
  </div>

  <div id="loginScreen">
    <div class="login-card">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      </div>
      <h2>VibeChat</h2>
      <p>Acesse sua conta para conversar.</p>
      
      <input type="email" id="authEmail" class="auth-input" placeholder="Seu E-mail">
      <input type="password" id="authPassword" class="auth-input" placeholder="Sua Senha">
      
      <button class="primary-btn" onclick="loginWithEmail()">Entrar</button>
      <button class="secondary-btn" onclick="registerWithEmail()">Criar Nova Conta</button>
      
      <p class="login-footer" id="authMessage">Seus dados estão seguros e criptografados</p>
    </div>
  </div>

  <div id="app">
    <div class="top-bar">
      <div class="left">
        <img class="user-avatar" id="userAvatar" src="" alt="Perfil" onclick="toggleDrawer()"/>
        <span class="app-title">VibeChat</span>
      </div>
      <div class="actions">
        <button onclick="openNewChatModal()" title="Nova conversa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
        <button onclick="toggleDrawer()" title="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
      </div>
    </div>
    <div class="tabs">
      <button class="active" onclick="switchTab(this,'all')">Conversas</button>
      <button onclick="switchTab(this,'family')">Família</button>
      <button onclick="switchTab(this,'friends')">Amigos</button>
    </div>
    <div class="search-bar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Pesquisar conversas..." id="searchInput" oninput="filterChats()"/>
      </div>
    </div>
    <div class="chat-list" id="chatList">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <h3>Nenhuma conversa ainda</h3>
        <p>Toque no botão + para iniciar uma nova conversa</p>
      </div>
    </div>
    <button class="fab" onclick="openNewChatModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <div id="chatView">
    <div class="chat-header">
      <button class="back-btn" onclick="closeChatView()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
      <img class="peer-avatar" id="peerAvatar" src="" alt=""/>
      <div class="peer-info">
        <div class="peer-name" id="peerName"></div>
        <div class="peer-status" id="peerStatus">online</div>
      </div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-bar">
      <button class="emoji-btn" title="Emoji"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
      <button class="attach-btn" title="Anexar arquivo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
      <textarea class="msg-input" id="msgInput" placeholder="Mensagem..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <button class="close-drawer" onclick="toggleDrawer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <img class="profile-img" id="drawerAvatar" src="" alt="Perfil"/>
      <h3 id="drawerName">Usuário</h3>
      <p id="drawerEmail">usuario@email.com</p>
    </div>
    <div class="drawer-menu">
      <div class="drawer-menu-item" onclick="logout()" style="color:#e74c3c">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sair
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="newChatModal" onclick="closeNewChatModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Nova Conversa</h3>
      <input type="email" id="newChatEmail" placeholder="Email do contato (ex: amigo@gmail.com)"/>
      <button class="start-chat-btn" onclick="startNewChat()">Iniciar Conversa</button>
    </div>
  </div>

  <audio id="notifSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVggoSCfWttcY2kp5JrSD1bfIGBfXVwd42lqJNsSD5bg4OBfHRwcI2lqJRtST5bg4F/e3RxcY6mqJRtSj5bg4F/e3RxcY6mqJRtSj5bg4F/e3RxcY6mqJRtSj5bgoF/e3RxcY6mqJRtSj5bgoF/e3RxcY6mqJRtSj5bgoF/e3RxcY6mqJRtSj5b" type="audio/wav"/>
  </audio>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  
  <script>
    // ⚠️ PREENCHA AQUI NOVAMENTE PARA NÃO FALTAR NADA
    const firebaseConfig = {
      apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSlKmBl4ZYMZw1R4I",
      authDomain: "vibe-app-bbba2.firebaseapp.com",
      projectId: "vibe-app-bbba2",
      storageBucket: "vibe-app-bbba2.firebasestorage.app",
      messagingSenderId: "SEU_MESSAGING_SENDER_ID", // ⚠️ preencha
      appId: "SEU_APP_ID" // ⚠️ preencha
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentChatId = null;
    let currentPeer = null;
    let chatsData = {};
    let unsubMessages = null;
    let unsubChats = null;
    let currentTab = 'all';

    setTimeout(() => {
      document.getElementById('splash').classList.add('hide');
      setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
    }, 1800);

    // =============================================
    // NOVO SISTEMA DE LOGIN (E-mail e Senha)
    // =============================================
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        showApp();
        updatePresence();
        listenToChats();
      } else {
        currentUser = null;
        document.getElementById('loginScreen').classList.remove('hide');
        document.getElementById('app').classList.remove('show');
      }
    });

    function showAuthError(msg) {
        document.getElementById('authMessage').textContent = msg;
        document.getElementById('authMessage').style.color = '#e74c3c';
    }

    function loginWithEmail() {
        const e = document.getElementById('authEmail').value;
        const p = document.getElementById('authPassword').value;
        if(!e || !p) return showAuthError('Preencha e-mail e senha.');
        auth.signInWithEmailAndPassword(e, p).catch(err => showAuthError(err.message));
    }

    function registerWithEmail() {
        const e = document.getElementById('authEmail').value;
        const p = document.getElementById('authPassword').value;
        if(!e || !p) return showAuthError('Preencha e-mail e senha.');
        auth.createUserWithEmailAndPassword(e, p).catch(err => showAuthError(err.message));
    }

    function logout() {
      if (unsubChats) unsubChats();
      if (unsubMessages) unsubMessages();
      auth.signOut();
      toggleDrawer();
    }

    function showApp() {
      document.getElementById('loginScreen').classList.add('hide');
      document.getElementById('app').classList.add('show');
      const avatar = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238696a0"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
      document.getElementById('userAvatar').src = avatar;
      document.getElementById('drawerAvatar').src = avatar;
      document.getElementById('drawerName').textContent = currentUser.email.split('@')[0];
      document.getElementById('drawerEmail').textContent = currentUser.email;
      
      db.collection('users').doc(currentUser.uid).set({
        email: currentUser.email,
        displayName: currentUser.email.split('@')[0],
        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    function updatePresence() {
      if (!currentUser) return;
      db.collection('users').doc(currentUser.uid).update({
        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
        online: true
      });
      window.addEventListener('beforeunload', () => {
        db.collection('users').doc(currentUser.uid).update({ online: false });
      });
    }

    // =============================================
    // LÓGICA DE CHAT ORIGINAL MANTIDA
    // =============================================
    function listenToChats() {
      if (unsubChats) unsubChats();
      unsubChats = db.collection('chats').where('members', 'array-contains', currentUser.uid)
        .orderBy('lastMessageTime', 'desc').onSnapshot(snapshot => {
        chatsData = {};
        snapshot.forEach(doc => { chatsData[doc.id] = { id: doc.id, ...doc.data() }; });
        renderChatList();
      });
    }

    function renderChatList() {
      const list = document.getElementById('chatList');
      const empty = document.getElementById('emptyState');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = Object.values(chatsData).filter(c => {
        const peerName = (c.peerNames?.[currentUser.uid] || '').toLowerCase();
        return (!search || peerName.includes(search)) && (currentTab === 'all' || c.group === currentTab);
      });

      if (filtered.length === 0) {
        empty.style.display = 'flex';
        Array.from(list.children).forEach(ch => { if (ch.id !== 'emptyState') ch.remove(); });
        return;
      }
      empty.style.display = 'none';
      
      let html = '';
      filtered.forEach(chat => {
        const peerName = chat.peerNames?.[currentUser.uid] || 'Contato';
        const lastMsg = chat.lastMessage || 'Sem mensagens';
        const unread = chat.unread?.[currentUser.uid] || 0;
        const avatarSrc = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238696a0"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
        
        html += `
        <div class="chat-item" onclick="openChat('${chat.id}')">
          <img class="avatar" src="${avatarSrc}"/>
          <div class="info">
            <div class="name">${escapeHtml(peerName)}</div>
            <div class="last-msg">${escapeHtml(lastMsg)}</div>
          </div>
          <div class="meta">
            ${unread > 0 ? `<div class="badge">${unread}</div>` : ''}
          </div>
        </div>`;
      });
      list.innerHTML = html;
    }

    async function openChat(chatId) {
      currentChatId = chatId;
      const chat = chatsData[chatId];
      if (!chat) return;
      document.getElementById('peerName').textContent = chat.peerNames?.[currentUser.uid] || 'Contato';
      document.getElementById('chatView').classList.add('show');
      db.collection('chats').doc(chatId).update({ [`unread.${currentUser.uid}`]: 0 });
      listenToMessages(chatId);
    }

    function closeChatView() {
      document.getElementById('chatView').classList.remove('show');
      if (unsubMessages) unsubMessages();
      currentChatId = null;
    }

    function listenToMessages(chatId) {
      if (unsubMessages) unsubMessages();
      const area = document.getElementById('messagesArea');
      unsubMessages = db.collection('chats').doc(chatId).collection('messages')
        .orderBy('timestamp', 'asc').onSnapshot(snapshot => {
        area.innerHTML = '';
        snapshot.forEach(doc => {
          const msg = doc.data();
          const isSent = msg.senderId === currentUser.uid;
          area.innerHTML += `<div class="msg ${isSent ? 'sent' : 'received'}"><div class="text">${escapeHtml(msg.text || '')}</div></div>`;
        });
        area.scrollTop = area.scrollHeight;
      });
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !currentChatId) return;
      input.value = '';
      input.style.height = '42px';
      
      const peerUid = chatsData[currentChatId]?.members?.find(m => m !== currentUser.uid);
      await db.collection('chats').doc(currentChatId).collection('messages').add({
        text, senderId: currentUser.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      await db.collection('chats').doc(currentChatId).update({
        lastMessage: text, lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
        [`unread.${peerUid}`]: firebase.firestore.FieldValue.increment(1)
      });
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function autoResize(el) { el.style.height = '42px'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
    function openNewChatModal() { document.getElementById('newChatModal').classList.add('show'); }
    function closeNewChatModal() { document.getElementById('newChatModal').classList.remove('show'); }

    async function startNewChat() {
      const email = document.getElementById('newChatEmail').value.trim().toLowerCase();
      if (!email) return alert('Digite o email');
      const userSnap = await db.collection('users').where('email', '==', email).get();
      if (userSnap.empty) return alert('Usuário não encontrado.');
      
      const peerUid = userSnap.docs[0].id;
      const members = [currentUser.uid, peerUid].sort();
      const chatId = members.join('_');
      
      const existingChat = await db.collection('chats').doc(chatId).get();
      if (!existingChat.exists) {
        await db.collection('chats').doc(chatId).set({
          members,
          peerNames: { [currentUser.uid]: email.split('@')[0], [peerUid]: currentUser.email.split('@')[0] },
          lastMessage: '', lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
          unread: { [currentUser.uid]: 0, [peerUid]: 0 }, group: 'all'
        });
      }
      closeNewChatModal(); openChat(chatId);
    }

    function switchTab(btn, tab) {
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentTab = tab; renderChatList();
    }
    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('show');
      document.getElementById('drawerOverlay').classList.toggle('show');
    }
    function filterChats() { renderChatList(); }
    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

    // =============================================
    // REGISTRO DO SERVICE WORKER PARA O PWA
    // =============================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('✅ SW Registrado'))
          .catch(err => console.warn('⚠️ SW Falhou', err));
      });
    }
  </script>
</body>
</html>
